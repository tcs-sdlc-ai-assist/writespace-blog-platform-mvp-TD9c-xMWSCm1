<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — WriteSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white shadow-md rounded-lg p-8 border border-gray-200">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
                    <p class="text-sm text-gray-500 mt-1">Sign in to your WriteSpace account</p>
                </div>

                <div id="error-container"></div>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            placeholder="Enter your username"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="current-password"
                            placeholder="Enter your password"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                    </div>

                    <button
                        type="submit"
                        id="submit-btn"
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Sign in
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-gray-500">
                    Don't have an account?
                    <a href="/register.html" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">Create one</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        (function () {
            var user = getUserFromToken();
            if (user) {
                window.location.href = '/posts.html';
                return;
            }

            var navContainer = document.getElementById('nav-container');
            navContainer.appendChild(createNav());

            var form = document.getElementById('login-form');
            var submitBtn = document.getElementById('submit-btn');
            var errorContainer = document.getElementById('error-container');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                errorContainer.innerHTML = '';

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;

                if (!username || !password) {
                    showError(errorContainer, 'Username and password are required.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in…';

                apiRequest('/auth/login', {
                    method: 'POST',
                    body: { username: username, password: password },
                })
                    .then(function (result) {
                        setToken(result.data.token);
                        window.location.href = '/posts.html';
                    })
                    .catch(function (err) {
                        showError(errorContainer, err.message || 'Login failed. Please try again.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Sign in';
                    });
            });
        })();
    </script>
</body>
</html>
