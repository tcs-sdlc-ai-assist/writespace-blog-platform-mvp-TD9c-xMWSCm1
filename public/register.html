<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — WriteSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white shadow-md rounded-lg p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900">Create an Account</h1>
                    <p class="mt-2 text-sm text-gray-600">Join WriteSpace and start sharing your thoughts</p>
                </div>

                <div id="error-container"></div>

                <form id="register-form" class="space-y-5">
                    <div>
                        <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                        <input
                            type="text"
                            id="display_name"
                            name="display_name"
                            required
                            minlength="1"
                            maxlength="100"
                            placeholder="Jane Doe"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                    </div>

                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            minlength="3"
                            maxlength="50"
                            pattern="[a-zA-Z0-9_\-]+"
                            placeholder="janedoe"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                        <p class="mt-1 text-xs text-gray-500">3–50 characters. Letters, numbers, underscores, and hyphens only.</p>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="8"
                            placeholder="••••••••"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                        <p class="mt-1 text-xs text-gray-500">Must be at least 8 characters.</p>
                    </div>

                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            required
                            minlength="8"
                            placeholder="••••••••"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        />
                    </div>

                    <button
                        type="submit"
                        id="register-btn"
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Create Account
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-gray-600">
                    Already have an account?
                    <a href="/login.html" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        (function () {
            var navContainer = document.getElementById('nav-container');
            navContainer.appendChild(createNav());

            var user = getUserFromToken();
            if (user) {
                window.location.href = '/posts.html';
                return;
            }

            var form = document.getElementById('register-form');
            var registerBtn = document.getElementById('register-btn');
            var errorContainer = document.getElementById('error-container');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                errorContainer.innerHTML = '';

                var displayName = document.getElementById('display_name').value.trim();
                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirm_password').value;

                if (!displayName) {
                    showError(errorContainer, 'Display name is required.');
                    return;
                }

                if (displayName.length > 100) {
                    showError(errorContainer, 'Display name must be at most 100 characters.');
                    return;
                }

                if (!username || username.length < 3 || username.length > 50) {
                    showError(errorContainer, 'Username must be between 3 and 50 characters.');
                    return;
                }

                if (!/^[a-zA-Z0-9_\-]+$/.test(username)) {
                    showError(errorContainer, 'Username must contain only letters, numbers, underscores, or hyphens.');
                    return;
                }

                if (password.length < 8) {
                    showError(errorContainer, 'Password must be at least 8 characters.');
                    return;
                }

                if (password !== confirmPassword) {
                    showError(errorContainer, 'Passwords do not match.');
                    return;
                }

                registerBtn.disabled = true;
                registerBtn.textContent = 'Creating account…';

                try {
                    var result = await apiRequest('/auth/register', {
                        method: 'POST',
                        body: {
                            display_name: displayName,
                            username: username,
                            password: password,
                        },
                    });

                    setToken(result.data.token);
                    window.location.href = '/posts.html';
                } catch (err) {
                    showError(errorContainer, err.message || 'Registration failed. Please try again.');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            });
        })();
    </script>
</body>
</html>
