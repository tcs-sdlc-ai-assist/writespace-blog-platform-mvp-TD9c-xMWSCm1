<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Posts - WriteSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-gray-900">All Posts</h1>
            <a href="/new-post.html"
               class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                </svg>
                New Post
            </a>
        </div>

        <div id="loading" class="flex items-center justify-center py-16">
            <div class="text-gray-500 text-sm">Loading posts...</div>
        </div>

        <div id="error-container"></div>

        <div id="empty-state" class="hidden text-center py-16">
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
            </svg>
            <h3 class="mt-4 text-lg font-medium text-gray-900">No posts yet</h3>
            <p class="mt-2 text-sm text-gray-500">Get started by creating your first post.</p>
            <a href="/new-post.html"
               class="mt-4 inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors">
                Create a Post
            </a>
        </div>

        <div id="posts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-6 mt-auto">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            &copy; 2024 WriteSpace. All rights reserved.
        </div>
    </footer>

    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
        <div class="bg-white rounded-lg shadow-xl max-w-sm w-full mx-4 p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Delete Post</h3>
            <p class="text-sm text-gray-600 mb-6">Are you sure you want to delete this post? This action cannot be undone.</p>
            <div class="flex justify-end space-x-3">
                <button id="cancel-delete"
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors cursor-pointer">
                    Cancel
                </button>
                <button id="confirm-delete"
                        class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 transition-colors cursor-pointer">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        (function () {
            var user = requireAuth();
            if (!user) return;

            var navContainer = document.getElementById('nav-container');
            navContainer.appendChild(createNav());

            var loadingEl = document.getElementById('loading');
            var emptyStateEl = document.getElementById('empty-state');
            var postsGridEl = document.getElementById('posts-grid');
            var errorContainer = document.getElementById('error-container');
            var deleteModal = document.getElementById('delete-modal');
            var cancelDeleteBtn = document.getElementById('cancel-delete');
            var confirmDeleteBtn = document.getElementById('confirm-delete');
            var pendingDeleteId = null;

            cancelDeleteBtn.addEventListener('click', function () {
                deleteModal.classList.add('hidden');
                pendingDeleteId = null;
            });

            confirmDeleteBtn.addEventListener('click', function () {
                if (!pendingDeleteId) return;
                var postId = pendingDeleteId;
                pendingDeleteId = null;
                deleteModal.classList.add('hidden');
                deletePost(postId);
            });

            function getExcerpt(content, maxLength) {
                if (!content) return '';
                if (content.length <= maxLength) return content;
                var trimmed = content.substring(0, maxLength);
                var lastSpace = trimmed.lastIndexOf(' ');
                if (lastSpace > maxLength * 0.6) {
                    trimmed = trimmed.substring(0, lastSpace);
                }
                return trimmed + '…';
            }

            function createPostCard(post) {
                var card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow';
                card.setAttribute('data-post-id', post.id);

                var body = document.createElement('div');
                body.className = 'p-5 flex-1 flex flex-col';

                var titleLink = document.createElement('a');
                titleLink.href = '/post.html?id=' + post.id;
                titleLink.className = 'text-lg font-semibold text-gray-900 hover:text-blue-600 transition-colors line-clamp-2';
                titleLink.textContent = post.title;
                body.appendChild(titleLink);

                var excerpt = document.createElement('p');
                excerpt.className = 'mt-2 text-sm text-gray-600 flex-1 line-clamp-3';
                excerpt.textContent = getExcerpt(post.content, 150);
                body.appendChild(excerpt);

                var meta = document.createElement('div');
                meta.className = 'mt-4 flex items-center space-x-2';

                var avatar = createAvatar(post.author.display_name, post.author.role);
                meta.appendChild(avatar);

                var metaText = document.createElement('div');
                metaText.className = 'flex-1 min-w-0';

                var authorName = document.createElement('p');
                authorName.className = 'text-sm font-medium text-gray-900 truncate';
                authorName.textContent = post.author.display_name;
                metaText.appendChild(authorName);

                var dateEl = document.createElement('p');
                dateEl.className = 'text-xs text-gray-500';
                dateEl.textContent = formatDate(post.created_at);
                metaText.appendChild(dateEl);

                meta.appendChild(metaText);
                body.appendChild(meta);

                card.appendChild(body);

                if (post.can_edit || post.can_delete) {
                    var actions = document.createElement('div');
                    actions.className = 'px-5 py-3 bg-gray-50 border-t border-gray-100 flex items-center justify-end space-x-2';

                    if (post.can_edit) {
                        var editBtn = document.createElement('a');
                        editBtn.href = '/edit-post.html?id=' + post.id;
                        editBtn.className = 'inline-flex items-center px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 rounded-md hover:bg-blue-100 transition-colors';
                        editBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>Edit';
                        actions.appendChild(editBtn);
                    }

                    if (post.can_delete) {
                        var deleteBtn = document.createElement('button');
                        deleteBtn.className = 'inline-flex items-center px-3 py-1.5 text-xs font-medium text-red-700 bg-red-50 rounded-md hover:bg-red-100 transition-colors cursor-pointer';
                        deleteBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>Delete';
                        deleteBtn.addEventListener('click', function () {
                            pendingDeleteId = post.id;
                            deleteModal.classList.remove('hidden');
                        });
                        actions.appendChild(deleteBtn);
                    }

                    card.appendChild(actions);
                }

                return card;
            }

            function renderPosts(posts) {
                loadingEl.classList.add('hidden');

                if (!posts || posts.length === 0) {
                    emptyStateEl.classList.remove('hidden');
                    postsGridEl.classList.add('hidden');
                    return;
                }

                emptyStateEl.classList.add('hidden');
                postsGridEl.innerHTML = '';

                for (var i = 0; i < posts.length; i++) {
                    postsGridEl.appendChild(createPostCard(posts[i]));
                }

                postsGridEl.classList.remove('hidden');
            }

            async function loadPosts() {
                try {
                    var result = await apiRequest('/posts');
                    renderPosts(result.data);
                } catch (err) {
                    loadingEl.classList.add('hidden');
                    showError(errorContainer, err.message || 'Failed to load posts');
                }
            }

            async function deletePost(postId) {
                try {
                    await apiRequest('/posts/' + postId, { method: 'DELETE' });
                    var cardEl = postsGridEl.querySelector('[data-post-id="' + postId + '"]');
                    if (cardEl) {
                        cardEl.remove();
                    }
                    var remaining = postsGridEl.querySelectorAll('[data-post-id]');
                    if (remaining.length === 0) {
                        postsGridEl.classList.add('hidden');
                        emptyStateEl.classList.remove('hidden');
                    }
                    showSuccess(errorContainer, 'Post deleted successfully');
                } catch (err) {
                    showError(errorContainer, err.message || 'Failed to delete post');
                }
            }

            loadPosts();
        })();
    </script>
</body>
</html>
