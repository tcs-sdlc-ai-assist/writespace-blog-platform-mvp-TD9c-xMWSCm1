<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write Post — WriteSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div id="loading" class="flex items-center justify-center py-16">
            <div class="text-gray-500 text-sm">Loading...</div>
        </div>

        <div id="editor" class="hidden">
            <div class="mb-6">
                <h1 id="page-title" class="text-2xl font-bold text-gray-900">New Post</h1>
                <p id="page-subtitle" class="mt-1 text-sm text-gray-500">Share your thoughts with the world.</p>
            </div>

            <div id="error-container"></div>

            <form id="post-form" class="space-y-6">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        maxlength="200"
                        required
                        placeholder="Enter your post title..."
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-900 placeholder-gray-400"
                    />
                    <p class="mt-1 text-xs text-gray-400"><span id="title-count">0</span>/200 characters</p>
                </div>

                <div>
                    <label for="content" class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                    <textarea
                        id="content"
                        name="content"
                        rows="14"
                        required
                        placeholder="Write your post content here..."
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-900 placeholder-gray-400 resize-y"
                    ></textarea>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <a href="/posts.html" class="text-sm text-gray-500 hover:text-gray-700 transition-colors">← Back to posts</a>
                    <div class="flex items-center space-x-3">
                        <button
                            type="button"
                            id="cancel-btn"
                            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
                        >
                            Cancel
                        </button>
                        <button
                            type="submit"
                            id="submit-btn"
                            class="px-6 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            Publish
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div id="forbidden" class="hidden text-center py-16">
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Access Denied</h2>
            <p class="text-gray-500 mb-4">You do not have permission to edit this post.</p>
            <a href="/posts.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">← Back to posts</a>
        </div>

        <div id="not-found" class="hidden text-center py-16">
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Post Not Found</h2>
            <p class="text-gray-500 mb-4">The post you are looking for does not exist.</p>
            <a href="/posts.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">← Back to posts</a>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-6 mt-auto">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
            &copy; 2024 WriteSpace. All rights reserved.
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        (function () {
            var user = requireAuth();
            if (!user) return;

            var navContainer = document.getElementById('nav-container');
            navContainer.appendChild(createNav());

            var loadingEl = document.getElementById('loading');
            var editorEl = document.getElementById('editor');
            var forbiddenEl = document.getElementById('forbidden');
            var notFoundEl = document.getElementById('not-found');
            var pageTitleEl = document.getElementById('page-title');
            var pageSubtitleEl = document.getElementById('page-subtitle');
            var titleInput = document.getElementById('title');
            var contentInput = document.getElementById('content');
            var titleCountEl = document.getElementById('title-count');
            var submitBtn = document.getElementById('submit-btn');
            var cancelBtn = document.getElementById('cancel-btn');
            var postForm = document.getElementById('post-form');
            var errorContainer = document.getElementById('error-container');

            var params = new URLSearchParams(window.location.search);
            var postId = params.get('id');
            var isEditing = !!postId;

            titleInput.addEventListener('input', function () {
                titleCountEl.textContent = titleInput.value.length;
            });

            cancelBtn.addEventListener('click', function () {
                window.location.href = '/posts.html';
            });

            if (isEditing) {
                pageTitleEl.textContent = 'Edit Post';
                pageSubtitleEl.textContent = 'Update your post below.';
                submitBtn.textContent = 'Update';
                document.title = 'Edit Post — WriteSpace';
                loadPost(postId);
            } else {
                loadingEl.classList.add('hidden');
                editorEl.classList.remove('hidden');
                titleInput.focus();
            }

            async function loadPost(id) {
                try {
                    var result = await apiRequest('/posts/' + id);
                    var post = result.data;

                    if (!post.can_edit) {
                        loadingEl.classList.add('hidden');
                        forbiddenEl.classList.remove('hidden');
                        return;
                    }

                    titleInput.value = post.title;
                    contentInput.value = post.content;
                    titleCountEl.textContent = post.title.length;

                    loadingEl.classList.add('hidden');
                    editorEl.classList.remove('hidden');
                    titleInput.focus();
                } catch (err) {
                    loadingEl.classList.add('hidden');
                    if (err.status === 404) {
                        notFoundEl.classList.remove('hidden');
                    } else if (err.status === 401) {
                        window.location.href = '/login.html';
                    } else if (err.status === 403) {
                        forbiddenEl.classList.remove('hidden');
                    } else {
                        editorEl.classList.remove('hidden');
                        showError(errorContainer, err.message || 'Failed to load post.');
                    }
                }
            }

            postForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                var title = titleInput.value.trim();
                var content = contentInput.value.trim();

                if (!title) {
                    showError(errorContainer, 'Title is required.');
                    titleInput.focus();
                    return;
                }

                if (title.length > 200) {
                    showError(errorContainer, 'Title must be 200 characters or less.');
                    titleInput.focus();
                    return;
                }

                if (!content) {
                    showError(errorContainer, 'Content is required.');
                    contentInput.focus();
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = isEditing ? 'Updating...' : 'Publishing...';

                try {
                    var payload = { title: title, content: content };

                    if (isEditing) {
                        await apiRequest('/posts/' + postId, {
                            method: 'PUT',
                            body: payload,
                        });
                    } else {
                        await apiRequest('/posts', {
                            method: 'POST',
                            body: payload,
                        });
                    }

                    window.location.href = '/posts.html';
                } catch (err) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = isEditing ? 'Update' : 'Publish';

                    if (err.status === 401) {
                        window.location.href = '/login.html';
                        return;
                    }

                    if (err.status === 403) {
                        showError(errorContainer, 'You do not have permission to perform this action.');
                        return;
                    }

                    showError(errorContainer, err.message || 'Something went wrong. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
